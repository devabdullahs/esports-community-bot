name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public HTTPS base URL to probe
        required: false
        type: string
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_URL: ${{ inputs.base_url || vars.EWC_PUBLIC_URL }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Probe public routes
        run: |
          if [ -z "$BASE_URL" ]; then
            if [ "$EVENT_NAME" = "schedule" ]; then
              echo "Public smoke is not configured; scheduled probe skipped." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Set the base_url input or EWC_PUBLIC_URL repository variable before running this workflow." >&2
            exit 1
          fi
          node scripts/smoke-public.mjs --base-url "$BASE_URL"
