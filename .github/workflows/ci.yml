name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to a read-only token; no job in this workflow needs write scopes.
permissions:
  contents: read

jobs:
  bot-tests:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by SHA; Dependabot keeps them current.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  web:
    runs-on: ubuntu-latest
    env:
      # NOTE: only github/needs/strategy/matrix/vars/secrets/inputs contexts
      # are valid here — `runner` is NOT (it broke CI once already).
      DB_PATH: ${{ github.workspace }}/ci-bot.sqlite
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm --workspace @esports-community-bot/web run lint
      - run: npm --workspace @esports-community-bot/web run test
      - run: npm run web:build
