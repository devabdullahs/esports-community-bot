name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  web:
    runs-on: ubuntu-latest
    env:
      DB_PATH: ${{ runner.temp }}/ci-bot.sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --workspace @esports-community-bot/web run lint
      - run: npm --workspace @esports-community-bot/web run test
      - run: npm run web:build
