name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to a read-only token; no job in this workflow needs write scopes.
permissions:
  contents: read

jobs:
  bot-tests:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by SHA; Dependabot keeps them current.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  web:
    runs-on: ubuntu-latest
    env:
      # NOTE: only github/needs/strategy/matrix/vars/secrets/inputs contexts
      # are valid here — `runner` is NOT (it broke CI once already).
      DB_PATH: ${{ github.workspace }}/ci-bot.sqlite
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm --workspace @esports-community-bot/web run lint
      - run: npm --workspace @esports-community-bot/web run test
      - run: npm run web:build
