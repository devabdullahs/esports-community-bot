name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  web:
    runs-on: ubuntu-latest
    env:
      # NOTE: only github/needs/strategy/matrix/vars/secrets/inputs contexts
      # are valid here — `runner` is NOT (it broke CI once already).
      DB_PATH: ${{ github.workspace }}/ci-bot.sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --workspace @esports-community-bot/web run lint
      - run: npm --workspace @esports-community-bot/web run test
      - run: npm run web:build
