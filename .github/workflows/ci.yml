name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to a read-only token; no job in this workflow needs write scopes.
permissions:
  contents: read

jobs:
  bot-tests:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by SHA; Dependabot keeps them current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  postgres-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecb_ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecb_ci_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ecb_ci_test
      ALLOW_POSTGRES_TEST_RESET: "1"
      POSTGRES_TEST_HOST_ALLOWED: "1"
      PGSSLMODE: disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:postgres

  web:
    runs-on: ubuntu-latest
    env:
      # NOTE: only github/needs/strategy/matrix/vars/secrets/inputs contexts
      # are valid here — `runner` is NOT (it broke CI once already).
      DB_PATH: ${{ github.workspace }}/ci-bot.sqlite
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm --workspace @esports-community-bot/web run lint
      - run: npm --workspace @esports-community-bot/web run typecheck:native
      - run: npm --workspace @esports-community-bot/web run test
      - run: npm run web:build

  e2e:
    needs: web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Keep the job-level path inside the workspace; the runner creates and
      # removes its own isolated database below this ignored directory.
      DB_PATH: ${{ github.workspace }}/data/ci-e2e.sqlite
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run web:e2e:install
      - run: npm run web:e2e
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: playwright-failure-artifacts
          path: apps/web/test-results
          if-no-files-found: ignore
