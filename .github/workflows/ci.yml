name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to a read-only token; no job in this workflow needs write scopes.
permissions:
  contents: read

jobs:
  bot-tests:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by SHA; Dependabot keeps them current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  web:
    runs-on: ubuntu-latest
    env:
      # NOTE: only github/needs/strategy/matrix/vars/secrets/inputs contexts
      # are valid here — `runner` is NOT (it broke CI once already).
      DB_PATH: ${{ github.workspace }}/ci-bot.sqlite
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm --workspace @esports-community-bot/web run lint
      - run: npm --workspace @esports-community-bot/web run typecheck:native
      - run: npm --workspace @esports-community-bot/web run test
      - run: npm run web:build

  e2e:
    needs: web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Keep the job-level path inside the workspace; the runner creates and
      # removes its own isolated database below this ignored directory.
      DB_PATH: ${{ github.workspace }}/data/ci-e2e.sqlite
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run web:e2e:install
      - run: npm run web:e2e
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: playwright-failure-artifacts
          path: apps/web/test-results
          if-no-files-found: ignore
